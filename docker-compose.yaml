version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: notebook-db
    env_file: 
      - ./back-nodejs/back-notebook/.production.env
    # restart: always
    ports:
      - 5432:5432
    environment:
      # POSTGRES_DB: ${POSTGRES_DB}
      # POSTGRES_USER: ${POSTGRES_USER}
      # POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # POSTGRES_PORT: ${POSTGRES_PORT}
      PG_DATA: /var/lib/postgresql/data
    volumes:
      - pg_data:/var/lib/postgresql/data

  back:
    container_name: notebook_back
    # restart: always
    build:
      context: ./back-nodejs/back-notebook/
    env_file: 
      - ./back-nodejs/back-notebook/.production.env
    # volumes:
      # - ./:/app
      # - ./node_modules:/app/node_modules
    ports:
      - 5000:5000
      - 9229:9229
    command: npm run start
    depends_on:
      - db
volumes:
  pg_data:

